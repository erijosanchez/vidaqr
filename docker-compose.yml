services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vidaqr_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
      - ./docker/php/local.ini:/usr/local/etc/php/conf.d/local.ini
    networks:
      - vidaqr_network
    depends_on:
      - db
      - redis

  nginx:
    image: nginx:alpine
    container_name: vidaqr_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - vidaqr_network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: vidaqr_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: vidaqr_db
      MYSQL_ROOT_PASSWORD: RootVidaqr202432
      MYSQL_PASSWORD: VidaqrAdmin2024643
      MYSQL_USER: vidaqr_admin
    ports:
      - "3307:3306"        # 3307 para no chocar con MySQL local
    volumes:
      - vidaqr_db_data:/var/lib/mysql
    networks:
      - vidaqr_network

  redis:
    image: redis:alpine
    container_name: vidaqr_redis
    restart: unless-stopped
    networks:
      - vidaqr_network

networks:
  vidaqr_network:
    driver: bridge

volumes:
  vidaqr_db_data: